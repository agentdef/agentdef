name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --outdir dist

      - name: Install from wheel (not editable — proves the wheel is self-contained)
        shell: bash
        run: pip install dist/*.whl pytest

      - name: Run test suite
        run: pytest validation/tests importers/tests adapters/tests tests -v

      - name: CLI smoke test
        run: |
          agentdef list
          agentdef validate examples/twitter-digest
          agentdef adapt claude examples/mission-writer --output smoke-CLAUDE.md
          agentdef import claude smoke-CLAUDE.md --output smoke-imported
          agentdef validate smoke-imported

      - name: Validate reference agents and template
        run: |
          agentdef validate examples/twitter-digest
          agentdef validate examples/mission-writer
          agentdef validate templates/starter

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build docs site (strict link check)
        run: |
          pip install mkdocs-material
          mkdocs build --strict
