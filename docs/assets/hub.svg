    <path d="M576,231 C630,236 635,268 686,268" marker-end="url(#aout)"/>
    <path d="M576,238 C630,250 630,306 686,306" marker-end="url(#aout)"/>
    <path d="M576,245 C630,264 630,344 686,344" marker-end="url(#aout)"/>
  </g>

  <!-- RIGHT: adapt to any platform -->
  <text x="808" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#2da160">ADAPT TO ANY PLATFORM</text>
  <text x="808" y="44" text-anchor="middle" font-size="11" fill="#8a8f98">agentdef adapt &lt;framework&gt;</text>
  <g font-size="12.5" fill="#24292f">
    <g transform="translate(690,63)">
      <rect width="236" height="30" rx="6" fill="#f2fbf5" stroke="#bfe6cd"/><text x="12" y="19">CLAUDE.md (Claude / Claude Code)</text>
      <rect y="38" width="236" height="30" rx="6" fill="#f2fbf5" stroke="#bfe6cd"/><text x="12" y="57">copilot-instructions.md</text>
      <rect y="76" width="236" height="30" rx="6" fill="#f2fbf5" stroke="#bfe6cd"/><text x="12" y="95">cursor-rules.md</text>
      <rect y="114" width="236" height="30" rx="6" fill="#f2fbf5" stroke="#bfe6cd"/><text x="12" y="133">AGENTS.md</text>
      <rect y="152" width="236" height="30" rx="6" fill="#f2fbf5" stroke="#bfe6cd"/><text x="12" y="171">declarativeAgent.json (M365)</text>
