<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ain" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6d5ae0"/></marker>
    <marker id="aout" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2da160"/></marker>
  </defs>

  <!-- LEFT: import from anywhere -->
  <text x="150" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5ae0">IMPORT FROM ANYWHERE</text>
  <text x="150" y="44" text-anchor="middle" font-size="11" fill="#8a8f98">agentdef import &lt;framework&gt;</text>
  <g font-size="12.5" fill="#24292f">
    <g transform="translate(30,56)">
      <rect width="240" height="30" rx="6" fill="#f6f5ff" stroke="#c9c2f2"/><text x="12" y="19">CLAUDE.md · Claude Code subagents</text>
      <rect y="38" width="240" height="30" rx="6" fill="#f6f5ff" stroke="#c9c2f2"/><text x="12" y="57">copilot-instructions.md · *.agent.md</text>
