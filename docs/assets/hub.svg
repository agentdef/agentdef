  <!-- CENTER: canonical directory -->
  <g transform="translate(392,128)">
    <rect width="180" height="188" rx="12" fill="#ffffff" stroke="#6d5ae0" stroke-width="2"/>
    <text x="90" y="26" text-anchor="middle" font-size="13.5" font-weight="700" fill="#4636b8">my-agent/</text>
    <g font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="12" fill="#24292f">
      <text x="16" y="50">├─ agent.md</text>
      <text x="16" y="70">├─ manifest.yaml</text>
      <text x="16" y="90">└─ instructions/</text>
      <text x="30" y="110">└─ core.md</text>
    </g>
    <g font-size="10.5" fill="#6b7280">
      <text x="16" y="136">+ skills/ workflows/ tools/</text>
      <text x="16" y="151">+ knowledge/ runtime/ evals/</text>
    </g>
    <text x="90" y="176" text-anchor="middle" font-size="11" font-weight="600" fill="#4636b8">one canonical definition</text>
  </g>
  <text x="482" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#24292f">AGENTDEF</text>
  <text x="482" y="340" text-anchor="middle" font-size="10.5" fill="#6b7280">validated · versionable · byte-identical round-trips</text>

  <!-- arrows out -->
  <g stroke="#2da160" stroke-width="1.6" fill="none" opacity="0.9">
