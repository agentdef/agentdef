      <rect y="114" width="240" height="30" rx="6" fill="#f6f5ff" stroke="#c9c2f2"/><text x="12" y="133">declarativeAgent.json (M365)</text>
      <rect y="152" width="240" height="30" rx="6" fill="#f6f5ff" stroke="#c9c2f2"/><text x="12" y="171">.cursor/rules/*.mdc · .cursorrules</text>
      <rect y="190" width="240" height="30" rx="6" fill="#f6f5ff" stroke="#c9c2f2"/><text x="12" y="209">AGENTS.md (agents.md convention)</text>
      <rect y="228" width="240" height="30" rx="6" fill="#f6f5ff" stroke="#c9c2f2"/><text x="12" y="247">CrewAI agents.yaml / crew.yaml</text>
      <rect y="266" width="240" height="30" rx="6" fill="#f6f5ff" stroke="#c9c2f2"/><text x="12" y="285">Letta .af (behavior subset)</text>
      <rect y="304" width="240" height="30" rx="6" fill="#f6f5ff" stroke="#c9c2f2"/><text x="12" y="323">any markdown prompt / persona</text>
    </g>
  </g>

  <!-- arrows in -->
  <g stroke="#6d5ae0" stroke-width="1.6" fill="none" opacity="0.85">
    <path d="M274,71 C330,71 330,175 388,196" marker-end="url(#ain)"/>
